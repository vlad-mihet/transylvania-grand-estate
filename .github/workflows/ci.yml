name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: Typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma first: @tge/types imports enums (AdminRole, PropertyTier, …)
      # from @prisma/client, and those symbols only exist after `prisma
      # generate` emits the client. Building @tge/types before this step
      # fails with TS2305 "has no exported member" for every enum.
      - name: Generate Prisma client
        run: pnpm --filter @tge/api exec prisma generate
        env:
          # Prisma's validate step expects DATABASE_URL to be set even when
          # we're only generating (not connecting). Dummy value is fine.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build shared types
        run: pnpm --filter @tge/types build

      - name: Typecheck API
        run: pnpm --filter @tge/api exec tsc --noEmit -p tsconfig.build.json

      - name: Typecheck admin
        run: pnpm --filter @tge/admin exec tsc --noEmit

      - name: Build API
        run: pnpm --filter @tge/api build

      - name: Build admin
        run: pnpm --filter @tge/admin exec next build
        env:
          # Baked into the admin bundle at build time.
          NEXT_PUBLIC_API_URL: http://localhost:3333/api/v1
          API_URL: http://localhost:3333/api/v1

  lint:
    name: Lint
    # Added by the 2026-07 full sweep (BUG-101). Was ungated: academy's eslint
    # config was silently broken (hiding real errors) and 4 apps had lint
    # errors. Now green across all five, so it's a gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @tge/types imports Prisma enums; a few app files import from @tge/types,
      # so the client must exist before eslint resolves types.
      - name: Generate Prisma client
        run: pnpm --filter @tge/api exec prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build shared types
        run: pnpm --filter @tge/types build

      - name: Lint all projects
        run: pnpm lint:all

  e2e:
    name: API e2e
    # Testcontainers needs Docker. ubuntu-latest has it preinstalled.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma first — see the typecheck-build job for why order matters.
      - name: Generate Prisma client
        run: pnpm --filter @tge/api exec prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Build shared types
        run: pnpm --filter @tge/types build

      # apps/api source imports @tge/locale (e.g. localized-search.ts).
      # `test:e2e` runs jest directly without going through api's prebuild,
      # so node's CJS resolver can't find dist/index.js without this step.
      # Other jobs that call `pnpm --filter @tge/api build` get this
      # implicitly via api's prebuild.
      - name: Build shared locale
        run: pnpm --filter @tge/locale build

      - name: Run e2e tests
        run: pnpm --filter @tge/api test:e2e
        env:
          # Testcontainers provides DATABASE_URL at runtime; these only need
          # to satisfy env validation at Nest bootstrap time.
          JWT_ADMIN_ACCESS_SECRET: ci_admin_access_secret_ge_32_chars_xxx
          JWT_ADMIN_REFRESH_SECRET: ci_admin_refresh_secret_ge_32_chars_xx
          JWT_ACADEMY_ACCESS_SECRET: ci_academy_access_secret_ge_32_chars_x
          JWT_ACADEMY_REFRESH_SECRET: ci_academy_refresh_secret_ge_32_chars
          INVITATION_TOKEN_SECRET: ci_invitation_secret_ge_32_chars_xxxxxx
          ADMIN_PUBLIC_URL: http://admin.ci

  migration-smoke:
    name: Prisma migrate smoke
    # Catches migrations that fail to apply on a clean DB before they fail
    # on Fly's production release_command. Schema-only check — no app code
    # is exercised here, so it stays cheap and parallel to e2e.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations to clean DB
        run: pnpm --filter @tge/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Assert migration status clean
        run: pnpm --filter @tge/api exec prisma migrate status
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  playwright-landing:
    name: Playwright (landing)
    # Public-form regression gate. Closes the "Critical #16 / Major #16
    # could land on main" risk by running the contact-form / rate-limit /
    # i18n specs on every PR. Single browser to keep CI minutes reasonable;
    # the QA matrix runs all three locally.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_ADMIN_ACCESS_SECRET: ci_admin_access_secret_ge_32_chars_xxx
      JWT_ADMIN_REFRESH_SECRET: ci_admin_refresh_secret_ge_32_chars_xx
      JWT_ACADEMY_ACCESS_SECRET: ci_academy_access_secret_ge_32_chars_x
      JWT_ACADEMY_REFRESH_SECRET: ci_academy_refresh_secret_ge_32_chars
      INVITATION_TOKEN_SECRET: ci_invitation_secret_ge_32_chars_xxxxxx
      AUDIT_IP_PEPPER: ci_audit_pepper_ge_16_chars
      ADMIN_PUBLIC_URL: http://admin.ci
      CORS_ORIGINS: http://localhost:3050,http://localhost:3051,http://localhost:3052,http://localhost:3053
      PORT: 4000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      # The route sweep renders every page × 4 locales; all SSR fetches come
      # from one IP, so the global @nestjs/throttler bucket (60/min) 429s
      # them nondeterministically. This flag skips ONLY the throttler module
      # (validateEnv forbids it under NODE_ENV=production); the inquiry
      # rate-limit gate is a separate custom guard and still enforces.
      DEV_AUTH_THROTTLE_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tge/api exec prisma generate

      - name: Build shared types
        run: pnpm --filter @tge/types build

      # prisma db seed runs prisma/seed.ts which imports from @tge/data;
      # without this step the package's dist/ is missing and seed crashes
      # with MODULE_NOT_FOUND. The later "Build API" step builds it via
      # api's prebuild, but that runs after the seed step.
      - name: Build shared data
        run: pnpm --filter @tge/data build

      - name: Apply migrations + seed
        run: |
          pnpm --filter @tge/api exec prisma migrate deploy
          pnpm --filter @tge/api exec prisma db seed

      - name: Build API
        run: pnpm --filter @tge/api build

      - name: Start API in background
        run: |
          pnpm --filter @tge/api start:prod > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:4000/api/v1/health > /dev/null; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in 120s. Last logs:"
          tail -100 /tmp/api.log
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @tge/landing exec playwright install --with-deps chromium

      - name: Run landing Playwright suite
        run: pnpm --filter @tge/landing exec playwright test --project=desktop

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-landing-report
          path: apps/landing/tests/e2e/.report
          retention-days: 7

  playwright-revery:
    name: Playwright (revery)
    # Mirror of playwright-landing for the affordable-properties surface.
    # Revery's playwright.config.ts already has its own webServer — Playwright
    # auto-starts `next dev` for it.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_ADMIN_ACCESS_SECRET: ci_admin_access_secret_ge_32_chars_xxx
      JWT_ADMIN_REFRESH_SECRET: ci_admin_refresh_secret_ge_32_chars_xx
      JWT_ACADEMY_ACCESS_SECRET: ci_academy_access_secret_ge_32_chars_x
      JWT_ACADEMY_REFRESH_SECRET: ci_academy_refresh_secret_ge_32_chars
      INVITATION_TOKEN_SECRET: ci_invitation_secret_ge_32_chars_xxxxxx
      AUDIT_IP_PEPPER: ci_audit_pepper_ge_16_chars
      ADMIN_PUBLIC_URL: http://admin.ci
      CORS_ORIGINS: http://localhost:3050,http://localhost:3051,http://localhost:3052,http://localhost:3053
      PORT: 4000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      REVERY_API_URL: http://localhost:4000/api/v1
      # See playwright-landing: prevents SSR fetches from tripping the global
      # throttler during the full route sweep. Inquiry rate-limit gate
      # (rate-limit.spec.ts) uses its own guard and is unaffected.
      DEV_AUTH_THROTTLE_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tge/api exec prisma generate

      - name: Build shared types
        run: pnpm --filter @tge/types build

      # prisma db seed runs prisma/seed.ts which imports from @tge/data;
      # without this step the package's dist/ is missing and seed crashes
      # with MODULE_NOT_FOUND. The later "Build API" step builds it via
      # api's prebuild, but that runs after the seed step.
      - name: Build shared data
        run: pnpm --filter @tge/data build

      - name: Apply migrations + seed
        run: |
          pnpm --filter @tge/api exec prisma migrate deploy
          pnpm --filter @tge/api exec prisma db seed

      - name: Build API
        run: pnpm --filter @tge/api build

      - name: Start API in background
        run: |
          pnpm --filter @tge/api start:prod > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:4000/api/v1/health > /dev/null; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in 120s. Last logs:"
          tail -100 /tmp/api.log
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @tge/revery exec playwright install --with-deps chromium

      - name: Run revery Playwright suite (chromium only)
        run: pnpm --filter @tge/revery exec playwright test --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-revery-report
          path: apps/revery/playwright-report
          retention-days: 7

  playwright-academy:
    name: Playwright (academy)
    # Academy shipped with zero automated coverage and no gate (added by the
    # 2026-07 full-sweep). Chromium-only smoke + auth: the proxy auth-gate
    # contract and the public auth pages per locale. Academy's
    # playwright.config.ts boots `next dev` on 3053 itself; we provide
    # Postgres + the seeded API it proxies to.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_ADMIN_ACCESS_SECRET: ci_admin_access_secret_ge_32_chars_xxx
      JWT_ADMIN_REFRESH_SECRET: ci_admin_refresh_secret_ge_32_chars_xx
      JWT_ACADEMY_ACCESS_SECRET: ci_academy_access_secret_ge_32_chars_x
      JWT_ACADEMY_REFRESH_SECRET: ci_academy_refresh_secret_ge_32_chars
      INVITATION_TOKEN_SECRET: ci_invitation_secret_ge_32_chars_xxxxxx
      AUDIT_IP_PEPPER: ci_audit_pepper_ge_16_chars
      ADMIN_PUBLIC_URL: http://admin.ci
      CORS_ORIGINS: http://localhost:3050,http://localhost:3051,http://localhost:3052,http://localhost:3053
      PORT: 4000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_SITE: ACADEMY
      DEV_AUTH_THROTTLE_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tge/api exec prisma generate

      - name: Build shared types
        run: pnpm --filter @tge/types build

      - name: Build shared data
        run: pnpm --filter @tge/data build

      - name: Apply migrations + seed
        run: |
          pnpm --filter @tge/api exec prisma migrate deploy
          pnpm --filter @tge/api exec prisma db seed

      - name: Build API
        run: pnpm --filter @tge/api build

      - name: Start API in background
        run: |
          pnpm --filter @tge/api start:prod > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:4000/api/v1/health > /dev/null; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in 120s. Last logs:"
          tail -100 /tmp/api.log
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @tge/academy exec playwright install --with-deps chromium

      - name: Run academy Playwright suite (chromium only)
        run: pnpm --filter @tge/academy exec playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-academy-report
          path: apps/academy/playwright-report
          retention-days: 7

  playwright-admin:
    name: Playwright (admin)
    # The admin suite rotted silently while it was local-only (2026-07-06:
    # broken session wiring, throttle collisions, an impossible reorder
    # assertion) — this job makes it a gate. Admin's playwright.config.ts
    # webServer boots `next dev` on 3051 itself; we provide Postgres + the
    # seeded API. consumer-render.spec.ts is excluded: it smoke-tests the
    # landing/revery/academy apps, which this job doesn't boot (landing and
    # revery have their own jobs).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_ADMIN_ACCESS_SECRET: ci_admin_access_secret_ge_32_chars_xxx
      JWT_ADMIN_REFRESH_SECRET: ci_admin_refresh_secret_ge_32_chars_xx
      JWT_ACADEMY_ACCESS_SECRET: ci_academy_access_secret_ge_32_chars_x
      JWT_ACADEMY_REFRESH_SECRET: ci_academy_refresh_secret_ge_32_chars
      INVITATION_TOKEN_SECRET: ci_invitation_secret_ge_32_chars_xxxxxx
      AUDIT_IP_PEPPER: ci_audit_pepper_ge_16_chars
      ADMIN_PUBLIC_URL: http://localhost:3051
      CORS_ORIGINS: http://localhost:3050,http://localhost:3051,http://localhost:3052,http://localhost:3053
      PORT: 4000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      # The admin BFF routes (src/app/api/auth/*) proxy to NestJS server-side.
      API_URL: http://localhost:4000/api/v1
      # Pins the seeded super-admin password; auth.setup.ts + the loginAsAdmin
      # fixture read the same variable.
      SEED_ADMIN_PASSWORD: ci_admin_e2e_password_1
      # See playwright-landing: the suite's SSR + fixture logins share one IP.
      # The login-specific 5/min limit stays covered by the loginAsAdmin
      # fixture's synthetic-IP buckets when this flag is absent locally.
      DEV_AUTH_THROTTLE_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @tge/api exec prisma generate

      - name: Build shared types
        run: pnpm --filter @tge/types build

      # prisma db seed runs prisma/seed.ts which imports from @tge/data;
      # without this step the package's dist/ is missing and seed crashes
      # with MODULE_NOT_FOUND. The later "Build API" step builds it via
      # api's prebuild, but that runs after the seed step.
      - name: Build shared data
        run: pnpm --filter @tge/data build

      - name: Apply migrations + seed
        run: |
          pnpm --filter @tge/api exec prisma migrate deploy
          pnpm --filter @tge/api exec prisma db seed

      - name: Build API
        run: pnpm --filter @tge/api build

      - name: Start API in background
        run: |
          pnpm --filter @tge/api start:prod > /tmp/api.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:4000/api/v1/health > /dev/null; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in 120s. Last logs:"
          tail -100 /tmp/api.log
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @tge/admin exec playwright install --with-deps chromium

      - name: Run admin Playwright suite (consumer-render excluded)
        run: pnpm --filter @tge/admin exec playwright test --grep-invert "consumer-app render smoke"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-admin-report
          path: apps/admin/playwright-report
          retention-days: 7
