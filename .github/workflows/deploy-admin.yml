name: Deploy Admin to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl deploy --config apps/admin/fly.toml --remote-only \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN_ADMIN }}
          NEXT_PUBLIC_API_URL: https://tge-api.fly.dev/api/v1
