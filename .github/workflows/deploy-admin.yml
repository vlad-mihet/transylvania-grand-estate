name: Deploy Admin to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl deploy --config apps/admin/fly.toml --remote-only \
            --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}" \
            --build-arg NEXT_PUBLIC_EMAIL_VERIFICATION_DISABLED="${NEXT_PUBLIC_EMAIL_VERIFICATION_DISABLED}" \
            --build-arg NEXT_PUBLIC_GOOGLE_AUTH_DISABLED="${NEXT_PUBLIC_GOOGLE_AUTH_DISABLED}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN_ADMIN }}
          NEXT_PUBLIC_API_URL: https://tge-api.fly.dev/api/v1
          # Permanent feature flags — kept in sync with the API-side
          # secrets (EMAIL_VERIFICATION_DISABLED / GOOGLE_AUTH_DISABLED).
          # Edit this file + push to main (or workflow_dispatch) to flip them.
          NEXT_PUBLIC_EMAIL_VERIFICATION_DISABLED: 'true'
          NEXT_PUBLIC_GOOGLE_AUTH_DISABLED: 'true'
