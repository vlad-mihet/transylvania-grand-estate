name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/admin/**'
      - 'packages/**'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    if: |
      contains(join(github.event.commits.*.modified, ','), 'apps/api/') ||
      contains(join(github.event.commits.*.modified, ','), 'packages/')
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config apps/api/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-admin:
    name: Deploy Admin
    runs-on: ubuntu-latest
    if: |
      contains(join(github.event.commits.*.modified, ','), 'apps/admin/') ||
      contains(join(github.event.commits.*.modified, ','), 'packages/')
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config apps/admin/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
