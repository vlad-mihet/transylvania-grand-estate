app = 'tge-academy'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

# Health probe — /login renders without requiring an active session and
# returns 200 (same rationale as admin). Replace with a dedicated /health
# route once routes stabilise.
[[http_service.checks]]
  grace_period = '15s'
  interval = '30s'
  method = 'get'
  path = '/login'
  protocol = 'http'
  timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
