app = 'tge-academy'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

# Health probe — next-intl redirects /login → /ro/login (307), and Fly's
# http_service.checks refuses to accept the machine as healthy in that
# case (observed: "connect: connection refused" during the initial probe
# window). Probing the default locale directly returns 200 in one hop.
# Grace period bumped to match cold-start time observed on 256MB VMs.
[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'get'
  path = '/ro/login'
  protocol = 'http'
  timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
