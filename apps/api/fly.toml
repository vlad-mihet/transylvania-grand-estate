app = 'tge-api'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = "sh -c 'npx prisma migrate resolve --rolled-back 20260417000000_make_city_county_required 2>/dev/null || true; npx prisma migrate deploy'"

[env]
  PORT = '3333'
  NODE_ENV = 'production'
  STORAGE_TYPE = 'r2'

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
