app = 'tge-api'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = "npx prisma migrate deploy"

[env]
  PORT = '3333'
  NODE_ENV = 'production'
  STORAGE_TYPE = 'r2'

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep one machine awake: the API hosts @Cron jobs (hourly REBS listing
  # sync, crm-sync.cron.ts) which silently never fire while ALL machines are
  # auto-stopped — observed 2026-07-06: both machines asleep at the top of
  # the hour, no sync run. The second machine still scales to zero.
  min_machines_running = 1

# Separate live + ready probes so Fly can tell "process is up" from "process
# can serve traffic". `live` is cheap; `ready` touches Postgres and returns
# 503 on DB outage, letting Fly pull the VM from the rotation until it
# recovers.
[[http_service.checks]]
  grace_period = '10s'
  interval = '15s'
  method = 'get'
  path = '/api/v1/health/live'
  protocol = 'http'
  timeout = '5s'

[[http_service.checks]]
  grace_period = '20s'
  interval = '30s'
  method = 'get'
  path = '/api/v1/health/ready'
  protocol = 'http'
  timeout = '10s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
