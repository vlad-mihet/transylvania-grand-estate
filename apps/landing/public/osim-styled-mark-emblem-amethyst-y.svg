<?xml version="1.0" encoding="UTF-8"?>
<!--
  Transylvania Grand - OSIM styled mark (v7, emblem-leading lockup, amethyst GRAND)

  Structural shift from the interpunct family: the diamond now leads the
  lockup on the left as an emblem, and TRANSYLVANIA / GRAND read out
  horizontally to the right on a single monumental line. This is the
  Montblanc / Rolls-Royce / Chanel grammar - "symbol + wordmark" rather
  than "word - symbol - word".

  Color system: amethyst-dominant. Diamond keeps its original amethyst
  gradient. The Y of TRANSYLVANIA stays in amethyst (color-amethyst
  #7B68EE) per the prior variant, and GRAND now renders in the same
  flat amethyst, making it the boldest color statement in the mark.
  The remaining letters of TRANSYLVANIA (the geographic, weakly
  distinctive context) stay in cream as the neutral ground against
  which the amethyst elements read.

  Typography, diamond geometry, and filing notes are identical to the
  earlier variants. viewBox stays at 900x180 so this variant shares the
  5:1 aspect ratio of the interpunct family; the interpunct slot is
  reclaimed as a natural 45-unit word-space between TRANSYLVANIA and
  GRAND rather than as extra viewBox width.

  Palette values resolved from packages/tailwind-config/src/theme.css:
    color-amethyst-deep    #5B4FC4
    color-amethyst         #7B68EE
    color-amethyst-light   #9D8FFF
    color-cream            #F0EDE8

  Before filing with OSIM:
    1. Delete the rect preview background to restore transparency.
    2. Convert the text elements to outlined paths in Figma/Illustrator
       so the Cinzel geometry is locked and immune to font substitution.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 180"
     width="900" height="180"
     role="img"
     aria-label="Transylvania Grand">
  <title>Transylvania Grand</title>

  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&amp;display=swap');
      .tg-wordmark {
        font-family: 'Cinzel', 'Trajan Pro', 'Playfair Display', 'Cormorant Garamond', Georgia, serif;
        font-weight: 500;
        font-size: 40px;
        letter-spacing: 12px;
      }
      .tg-wordmark-hero     { fill: #F0EDE8; }
      .tg-wordmark-amethyst { fill: #7B68EE; }
    </style>

    <linearGradient id="tg-diamond-stroke" x1="12" y1="22" x2="12" y2="2" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B4FC4"/>
      <stop offset="50%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#9D8FFF"/>
    </linearGradient>
    <linearGradient id="tg-diamond-fill" x1="12" y1="22" x2="12" y2="2" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B4FC4" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#7B68EE" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9D8FFF" stop-opacity="0.30"/>
    </linearGradient>
    <linearGradient id="tg-diamond-facet" x1="12" y1="22" x2="12" y2="2" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9D8FFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9D8FFF" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- PREVIEW BACKGROUND - delete for transparent trademark file -->
  <rect width="900" height="180" fill="#141418"/>

  <!-- Brand diamond leading the lockup (emblem position) -->
  <svg x="46" y="40" width="100" height="100" viewBox="0 0 24 24" overflow="visible">
    <path d="M12 2L2 9.5L12 22L22 9.5L12 2Z" fill="url(#tg-diamond-fill)"/>
    <path d="M12 2L2 9.5L12 22L22 9.5L12 2Z"
          fill="none" stroke="url(#tg-diamond-stroke)" stroke-width="0.6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M2 9.5H22"
          fill="none" stroke="url(#tg-diamond-stroke)" stroke-width="0.5"
          stroke-linecap="round"/>
    <path d="M12 2L8.5 9.5L12 22"
          fill="none" stroke="url(#tg-diamond-facet)" stroke-width="0.4"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12 2L15.5 9.5L12 22"
          fill="none" stroke="url(#tg-diamond-facet)" stroke-width="0.4"
          stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <!-- TRANSYLVANIA: cream letters with amethyst Y accent -->
  <text class="tg-wordmark" text-anchor="start" x="171" y="105"
    ><tspan class="tg-wordmark-hero">TRANS</tspan
    ><tspan class="tg-wordmark-amethyst">Y</tspan
    ><tspan class="tg-wordmark-hero">LVANIA</tspan></text>

  <!-- GRAND: flat amethyst, full-word purple for the distinctive protectable element -->
  <text class="tg-wordmark tg-wordmark-amethyst" text-anchor="start" x="650" y="105">GRAND</text>
</svg>
